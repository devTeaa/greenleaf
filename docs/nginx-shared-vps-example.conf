# Example reverse-proxy config for Greenleaf running in SHARED mode.
#
# Paste these server blocks into your existing Nginx config (usually
# /etc/nginx/conf.d/greenleaf.conf).
#
# Assumptions:
#   - Greenleaf containers are up: 127.0.0.1:3051 (Nuxt), 127.0.0.1:3052 (Pocketbase), 127.0.0.1:3053 (Admin SPA)
#   - SSL is terminated here (use certbot/Let's Encrypt or Cloudflare cert)
#   - DNS records point greenleaf.example + greenleaf-backend.example to this VPS

# Rate limiting zone (optional — protects against abuse)
limit_req_zone $binary_remote_addr zone=greenleaf:10m rate=10r/s;

# ---------------- Storefront + Admin SPA ----------------
server {
    listen 443 ssl http2;
    server_name greenleaf.example;

    # SSL (adjust paths to your certs)
    ssl_certificate     /etc/letsencrypt/live/greenleaf.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/greenleaf.example/privkey.pem;

    # Optional: redirect www → apex
    # if ($host = www.greenleaf.example) { return 301 https://greenleaf.example$request_uri; }

    client_max_body_size 25M;
    limit_req zone=greenleaf burst=20 nodelay;

    # Vue CSR admin SPA (hash-routed)
    location /admin/ {
        proxy_pass http://127.0.0.1:3053/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nuxt storefront
    location / {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ---------------- Backend / API (Pocketbase) ----------------
# Pocketbase serves:
#   /_/     → raw admin dashboard (developers only)
#   /api/*  → REST API (used by Nuxt + Admin SPA)
server {
    listen 443 ssl http2;
    server_name greenleaf-backend.example;

    ssl_certificate     /etc/letsencrypt/live/greenleaf-backend.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/greenleaf-backend.example/privkey.pem;

    client_max_body_size 25M;
    limit_req zone=greenleaf burst=20 nodelay;

    location / {
        proxy_pass http://127.0.0.1:3052;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ---------------- HTTP → HTTPS redirect (both domains) ----------------
server {
    listen 80;
    server_name greenleaf.example greenleaf-backend.example;
    return 301 https://$host$request_uri;
}
