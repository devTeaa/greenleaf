# Nginx reverse proxy for Greenleaf (standalone mode)
#
# Three upstreams:
#   greenleaf.example             → Nuxt storefront (port 3000)
#   greenleaf.example/admin/      → Vue CSR admin SPA (port 80)
#   greenleaf-backend.example     → Pocketbase API + raw admin (port 3001)
#
# When using Cloudflare in front (recommended), set Cloudflare SSL mode to
# "Full" or "Full (strict)" — Cloudflare terminates TLS, Nginx serves HTTP.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 25M;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream nuxt {
    server nuxt:3000;
  }

  upstream backend {
    server backend:3001;
  }

  upstream admin {
    server admin:80;
  }

  # ---- Storefront + Admin SPA ----
  server {
    listen 80;

    server_name greenleaf.example;

    location /admin/ {
      proxy_pass http://admin/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://nuxt;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  # ---- Backend / API (Pocketbase) ----
  server {
    listen 80;

    server_name greenleaf-backend.example;

    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  # ---- Catch-all (redirect unknown hosts to storefront) ----
  server {
    listen 80 default_server;
    server_name _;
    return 301 http://greenleaf.example$request_uri;
  }
}
