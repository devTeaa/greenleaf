# Nginx reverse proxy for Greenleaf
#
# Two virtual hosts:
#   greenleaf.example      → Nuxt storefront (port 3000)
#   cms.greenleaf.example  → Payload admin + API (port 3001)
#
# When using Cloudflare in front (recommended), set Cloudflare SSL mode to
# "Full" or "Full (strict)" — Cloudflare terminates TLS, Nginx serves HTTP.
# For direct HTTPS without Cloudflare, issue certs with certbot and uncomment
# the listen 443 blocks + SSL directives below.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 25M;  # Payload media uploads
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Shared connection upgrade map for WebSockets (HMR / Payload realtime)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream nuxt {
    server nuxt:3000;
  }

  upstream payload {
    server cms:3001;
  }

  # ---- Storefront (Nuxt) ----
  server {
    listen 80;
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    server_name greenleaf.example;

    # Redirect HTTP → HTTPS if SSL is enabled
    # if ($scheme != "https") { return 301 https://$host$request_uri; }

    location / {
      proxy_pass http://nuxt;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  # ---- CMS / Admin (Payload) ----
  server {
    listen 80;
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    server_name cms.greenleaf.example;

    # if ($scheme != "https") { return 301 https://$host$request_uri; }

    location / {
      proxy_pass http://payload;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  # ---- Catch-all (redirect unknown hosts to storefront) ----
  server {
    listen 80 default_server;
    server_name _;
    return 301 http://greenleaf.example$request_uri;
  }
}
