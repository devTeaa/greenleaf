# Greenleaf production stack: Pocketbase CMS + Nuxt storefront (+ optional Nginx)
#
# Two deployment modes:
#
#   SHARED (default) — for VPS that hosts other apps alongside Greenleaf.
#     Your existing reverse proxy (Nginx/Caddy/Traefik) routes:
#       greenleaf.example       → 127.0.0.1:${NUXT_PORT:-3051}
#       cms.greenleaf.example   → 127.0.0.1:${CMS_PORT:-3052}
#       admin.greenleaf.example → 127.0.0.1:${ADMIN_PORT:-3053}
#     Run:  docker compose up -d
#
#   STANDALONE — Greenleaf owns the whole VPS.
#     Bundled Nginx listens on 80/443 and routes between Nuxt and Pocketbase.
#     Run:  docker compose --profile full up -d
#
# All ports/binds are configurable via .env.production. Defaults bind to
# 127.0.0.1 only — never expose Nuxt/CMS directly to the internet.

services:
  cms:
    build:
      context: ./cms
      args:
        # PB_ARCH must match the host architecture.
        # Most VPS (Linode, Hetzner AMD, DigitalOcean, AWS EC2 intel) → amd64
        # Apple Silicon local dev, Hetzner CAX (ARM), AWS Graviton → arm64
        # Override via .env.production: PB_ARCH=arm64
        PB_ARCH: ${PB_ARCH:-amd64}
    container_name: ${COMPOSE_PROJECT_NAME:-greenleaf}-cms
    restart: unless-stopped
    ports:
      # Host bind:port → container 3001. Default: 127.0.0.1:3052 (avoids conflicts with other apps on the VPS).
      - "${CMS_BIND:-127.0.0.1}:${CMS_PORT:-3052}:3001"
    environment:
      # Optional encryption key (32-char hex). Required in production.
      PB_ENCRYPTION_ENV: PB_ENCRYPTION_KEY
    env_file: .env.production
    volumes:
      - cms-db:/pb/pb_data
    networks:
      - greenleaf

  nuxt:
    build: ./web
    container_name: ${COMPOSE_PROJECT_NAME:-greenleaf}-nuxt
    restart: unless-stopped
    ports:
      # Host bind:port → container 3000. Default: 127.0.0.1:3051 (avoids conflicts with other apps on the VPS).
      - "${NUXT_BIND:-127.0.0.1}:${NUXT_PORT:-3051}:3000"
    # env_file loads ALL values from .env.production into the container.
    # The environment: block only sets values that are INTERNAL to Docker
    # (must NOT be in .env.production — they'd be wrong outside Docker).
    # DO NOT duplicate env_file values here — environment: overrides env_file.
    environment:
      # Server-side only: internal Docker network URL for SSR + Nitro.
      # The browser never sees this (it's not in runtimeConfig.public).
      NUXT_PAYLOAD_URL: http://cms:3001
    env_file: .env.production
    depends_on:
      - cms
    networks:
      - greenleaf

  admin:
    build:
      context: ./admin
      args:
        VITE_PB_URL: ${NUXT_PUBLIC_PAYLOAD_URL:-http://localhost:3052}
    container_name: ${COMPOSE_PROJECT_NAME:-greenleaf}-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_BIND:-127.0.0.1}:${ADMIN_PORT:-3053}:80"
    depends_on:
      - cms
    networks:
      - greenleaf

  # --------------------------------------------------------------------
  # Optional bundled Nginx. Only used with `--profile full`.
  # In SHARED mode (default), skip this and route via your own reverse proxy.
  # --------------------------------------------------------------------
  nginx:
    profiles: ["full"]
    build: ./nginx
    container_name: ${COMPOSE_PROJECT_NAME:-greenleaf}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - cms
      - nuxt
    networks:
      - greenleaf

networks:
  greenleaf:
    driver: bridge

volumes:
  cms-db:
